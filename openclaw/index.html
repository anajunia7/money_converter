<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Moedas</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="converter-card">
            <div class="header">
                <h1>💱 Conversor de Moedas</h1>
                <p class="subtitle">Taxas em tempo real</p>
            </div>

            <div class="input-group">
                <label for="amount">Valor</label>
                <input type="number" id="amount" placeholder="0.00" step="0.01" min="0">
            </div>

            <div class="currency-row">
                <div class="input-group">
                    <label for="from">De</label>
                    <select id="from">
                        <option value="BRL" selected>🇧🇷 BRL - Real</option>
                        <option value="USD">🇺🇸 USD - Dólar</option>
                        <option value="EUR">🇪🇺 EUR - Euro</option>
                        <option value="GBP">🇬🇧 GBP - Libra</option>
                        <option value="ARS">🇦🇷 ARS - Peso Argentino</option>
                        <option value="CAD">🇨🇦 CAD - Dólar Canadense</option>
                        <option value="JPY">🇯🇵 JPY - Iene</option>
                        <option value="CNY">🇨🇳 CNY - Yuan</option>
                    </select>
                </div>

                <button id="swap-btn" class="swap-btn" title="Inverter">⇄</button>

                <div class="input-group">
                    <label for="to">Para</label>
                    <select id="to">
                        <option value="BRL">🇧🇷 BRL - Real</option>
                        <option value="USD" selected>🇺🇸 USD - Dólar</option>
                        <option value="EUR">🇪🇺 EUR - Euro</option>
                        <option value="GBP">🇬🇧 GBP - Libra</option>
                        <option value="ARS">🇦🇷 ARS - Peso Argentino</option>
                        <option value="CAD">🇨🇦 CAD - Dólar Canadense</option>
                        <option value="JPY">🇯🇵 JPY - Iene</option>
                        <option value="CNY">🇨🇳 CNY - Yuan</option>
                    </select>
                </div>
            </div>

            <button id="convert-btn" class="convert-btn">Converter</button>

            <div id="result" class="result hidden">
                <div class="result-value" id="result-value">-</div>
                <div class="result-info" id="result-info"></div>
            </div>

            <div id="loading" class="loading hidden">⏳ Carregando...</div>
            <div id="error" class="error hidden"></div>
            <div class="last-update" id="last-update"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
